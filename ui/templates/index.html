<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>IoT Laptop Server</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
        }
        h1 {
            margin-bottom: 24px;
        }
        .row {
            margin-bottom: 12px;
        }
        button {
            padding: 10px 16px;
            margin-right: 8px;
            cursor: pointer;
        }
        #status {
            margin-top: 20px;
            padding: 12px;
            border: 1px solid #ccc;
            width: 400px;
            min-height: 40px;
        }
    </style>
</head>
<body>
    <h1>IoT Laptop Server - Control Panel</h1>

    <div class="row">
        <button onclick="startSession()">Start Session</button>
        <button onclick="stopSession()">Stop Session</button>
        <button onclick="testAudio()">Test Audio</button>
        <button onclick="replaySession()">Replay Session</button>
    </div>

    <div id="status">Trạng thái: chưa có thao tác</div>

    <script>
        function setStatus(text) {
            document.getElementById("status").innerText = text;
        }

        async function startSession() {
            setStatus("Đang start session...");
            try {
                const res = await fetch("/api/sessions/start", { method: "POST" });
                const data = await res.json();
                setStatus("Start session thành công: " + JSON.stringify(data));
            } catch (err) {
                setStatus("Lỗi start session: " + err);
            }
        }

        async function stopSession() {
            setStatus("Đang stop session...");
            try {
                const res = await fetch("/api/sessions/stop", { method: "POST" });
                const data = await res.json();
                setStatus("Stop session thành công: " + JSON.stringify(data));
            } catch (err) {
                setStatus("Lỗi stop session: " + err);
            }
        }

        async function testAudio() {
            setStatus("Đang test audio...");
            try {
                const res = await fetch("/api/devices/test-audio", { method: "POST" });
                const data = await res.json();
                setStatus("Test audio xong: " + JSON.stringify(data));
            } catch (err) {
                setStatus("Lỗi test audio: " + err);
            }
        }

        async function replaySession() {
            setStatus("Tính năng replay chưa làm xong.");
        }
    </script>
</body>
</html>
